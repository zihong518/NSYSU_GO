    <div class="email_us">
        <div class="modal fade " id="email_us" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered ">
                    <div class="modal-content">
                    <div class="text-end">
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="d-flex justify-content-center align-items-center">
                        <i class="far fa-envelope fs-2 me-2 " ></i>
                        <p class="d-inline fs-2 ">聯絡我們</p> 
                    </div>
                    <div class="modal-body mx-5">
                        <input type="text" class="form-control py-2 my-3 inner_shadow" placeholder="姓名*" required="required">
                        <input type="text" class="form-control py-2 my-3 inner_shadow" placeholder="聯絡電話*">
                        <input type="text" class="form-control py-2 my-3 inner_shadow" placeholder="信箱*">
                        <input type="text" class="form-control py-2 mt-3 inner_shadow" placeholder="訊息標題*">
                        <textarea class="form-control mt-3 inner_shadow" name="" id="" cols="30" rows="5" placeholder="訊息內容"></textarea>
                        <div class="d-flex justify-content-end mt-3">
                            <button type="button" class="btn btn-second px-5 cus_shadow" data-bs-dismiss="modal"  data-bs-toggle="modal" data-bs-target="#email_confirm" >確定送出</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
            
        <div class="modal fade " id="email_confirm" tabindex="-1" aria-labelledby="register_confirm" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered ">
            <div class="modal-content">
                <div class="text-end">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body mx-5 d-flex flex-column justify-content-center align-items-center">
                    <img src="img/check.png" alt="" class="w-25">
                    <p class="fs-1 my-3 fw-bold">填寫成功</p>
                    <p class="text-secondary my-1 text-center">感謝您的寶貴意見<br>我們將於工作日由專人以郵件回覆您的問題</p>
                </div>
                </div>
            </div>
        </div>
